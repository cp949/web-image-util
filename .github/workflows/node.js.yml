name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install

      - name: Run quality gates
        run: pnpm verify:ci

      - name: Build packages
        run: pnpm build

      - name: Check package subpath exports
        run: pnpm test:package-subpath
